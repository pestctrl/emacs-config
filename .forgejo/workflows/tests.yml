name: tests

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  ert:
    runs-on: docker
    container:
      image: node:20-bookworm
    steps:
      - name: Install Emacs
        run: |
          apt-get update
          apt-get install -y --no-install-recommends emacs-nox git

      - name: Check out repository
        uses: actions/checkout@v4

      - name: Check out elpa submodule
        run: git submodule update --init --depth 1 elpa

      - name: Run ERT test suite
        run: emacs -Q --batch -l run-tests-batch.el
