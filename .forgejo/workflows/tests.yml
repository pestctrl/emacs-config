name: tests

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  ert:
    runs-on: docker
    container:
      image: silex/emacs:30.2
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Run ERT test suite
        run: emacs -Q --batch -l run-tests-batch.el
